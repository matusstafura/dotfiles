monitor=,preferred,auto,1

$mainMod = SUPER

# TODO
# move to specific workspace
# naming the workspaces
# ?quote in foreign  language
# style waybar
# clean waybar, day, language, time, network(on,off)

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Bindings
bind = $mainMod, Return, exec, foot
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
# Lock screen
# windowrule = match:class google-chrome, workspace 1 silent

exec-once = ~/.config/tmux/import_env.sh
exec-once = flatpak run com.google.Chrome
exec-once = waybar
exec-once = foot
exec-once = hyprpaper
exec-once = fcitx5 -d # japanese keyboard hack

input {
    kb_layout = us
    follow_mouse = 1
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

dwindle {
    preserve_split = true
}

